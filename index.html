<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taani's World</title>
    <link rel="icon" href="assets/images/default-cover.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/magical-extras.css" />
  </head>
  <body>
    <div class="ambient-pixels" aria-hidden="true"></div>

    <main class="game-window" id="gameWindow">
      <header class="window-topbar">
        <a class="topbar-brand" href="#map" aria-label="Go to map">
          <span class="pixel-sunflower" aria-hidden="true">
            <span></span>
          </span>
          <span>For our favorite Taani ♡</span>
        </a>
        <div class="window-controls" aria-label="Tiny window controls">
          <button class="window-dot minimize" type="button" aria-label="Minimize"></button>
          <button class="window-dot maximize" type="button" aria-label="Maximize"></button>
          <button class="window-dot close" type="button" aria-label="Close"></button>
        </div>
      </header>

      <section class="title-sign" aria-labelledby="worldTitle">
        <div class="sign-flower sign-flower-left" aria-hidden="true"></div>
        <div class="vine vine-left" aria-hidden="true"></div>
        <div class="sign-copy">
          <p>WELCOME TO</p>
          <h1 id="worldTitle">Taani's World</h1>
          <span>memories • letters • love</span>
        </div>
        <div class="vine vine-right" aria-hidden="true"></div>
        <div class="sign-flower sign-flower-right" aria-hidden="true"></div>
        <i class="sign-sparkle sparkle-one" aria-hidden="true"></i>
        <i class="sign-sparkle sparkle-two" aria-hidden="true"></i>
        <i class="sign-heart heart-one" aria-hidden="true">♡</i>
        <i class="sign-heart heart-two" aria-hidden="true">♡</i>
      </section>

      <section class="page-shell" id="pageShell"></section>

      <footer class="bottom-bar">
        <span>made with ♡ by your friends</span>
        <strong>THANK YOU FOR EXISTING ♡</strong>
        <span class="clock-wrap" aria-label="Your local time">
          <span class="clock-label">Your local time</span>
          <span class="clock-stack">
            <time id="worldClock">--:--:--</time>
            <span class="clock-time-zone" id="worldTimeZone"></span>
          </span>
          <button class="sound-toggle" id="soundToggle" type="button" aria-label="Toggle sound">♪</button>
        </span>
      </footer>
    </main>

    <audio id="songAudio" preload="metadata"></audio>

    <script src="data/letters.js"></script>
    <script src="data/playlist.js"></script>
    <script src="data/friends.js"></script>
    <script src="data/reasons.js"></script>
    <script src="data/memories.js"></script>
    <script src="js/app.js"></script>
    <script src="js/magical-extras.js"></script>
  </body>
</html>
